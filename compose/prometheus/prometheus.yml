# Prometheus scrape yapılandırması (T2.8 / 12 §4).
# Hedef: Finans API container'ı 8080/metrics — OpenTelemetry.Exporter.Prometheus.AspNetCore çıktısı.
# Kaynak meter'lar: AspNetCore (RED), HttpClient (bağımlılık), Runtime (GC/CPU/Thread), Finans.Cache (T2.7).
#
# `/metrics` Caddy üzerinden DIŞARI verilmez (admin-only, 11 §5). Prometheus iç ağda doğrudan api'ye gider.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: dev
    service: finans

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: finans-api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8080']
        labels:
          service_name: finans-api

  # Prometheus kendi metriklerini de izler (uptime/scrape sağlığı).
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
