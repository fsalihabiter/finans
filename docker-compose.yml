# Lokal geliştirme yığını (02 §6): Caddy (TLS reverse proxy) + API + Postgres + Redis.
# `docker compose up --build` → migrate+seed'li API; **https://localhost** (Caddy'nin internal CA'sıyla;
# tarayıcı bir kez "Bu siteye git" uyarısı verir → kabul et). HTTP 80 → 443 otomatik yönlendirilir.
# Parola: env/.env ile ver (repoda yok — 11 §6); dev varsayılanı finans_dev.
#
# T2.9: Postgres + Redis + API artık **iç ağa kapanmış** (ports kaldırıldı, expose'la sadece
# servisler arası); dışarıdan yalnız Caddy üzerinden erişim (TLS + rate limit + güvenlik başlıkları).
# Yerel dev (compose dışı `dotnet run`) hâlâ doğrudan kendi PostgreSQL'inle çalışır — değişmedi.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: finans
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finans_dev}
      POSTGRES_DB: finans
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # ⚠ Dışarı port AÇMA (11 §5). Yerel dev'de elle kurulu PostgreSQL'i (5432) kullan.
    # Compose içindeki postgres yalnız compose servislerine açıktır.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finans -d finans"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Dağıtık cache (T2.7). Yerel `dotnet run` bunu KULLANMAZ (in-memory'e düşer);
  # yalnız compose yığını dağıtık cache kullanır. İç ağda kalır (dışarı kapalı — 11 §5).
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=finans;Username=finans;Password=${POSTGRES_PASSWORD:-finans_dev}"
      # Redis verilince IAppCache dağıtık cache'i (Redis) kullanır (T2.7).
      ConnectionStrings__Redis: "redis:6379"
      # Container HTTP servis eder (TLS proxy'de — 11 §5); başlangıçta migrate+seed.
      Security__UseHttpsRedirection: "false"
      Database__ApplyMigrationsOnStartup: "true"
      Database__Seed: "true"
      # Web Caddy üzerinden çağrı yapacak (https://localhost) + dev Vite (5173/5174).
      Cors__AllowedOrigins__0: "http://localhost:5173"
      Cors__AllowedOrigins__1: "http://localhost:5174"
      Cors__AllowedOrigins__2: "https://localhost"
      # Üretim için aşağıdaki TrustedProxies Caddy container IP'sini içermeli (gerçek client IP'sini
      # rate limit/log'da görmek için). Compose default bridge IP'leri 172.x.x.x — şimdilik açık.
      Security__ForwardedHeaders: "true"
      # T2.8: yapılandırılmış log Seq'e (iç ağ, ingestion 5341). Boş bırakılırsa sink eklenmez.
      Serilog__Seq__ServerUrl: "http://seq:5341"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # ⚠ Dışarı port AÇMA — Caddy'den geç (11 §5).
    expose:
      - "8080"

  # ── Gözlemlenebilirlik yığını (T2.8 / 12) ────────────────────────────────────
  # Üçü de iç ağda; **admin UI port'ları yalnız 127.0.0.1'e bağlanır** (LAN'a açılmaz, 11 §5).
  # Production'da SSH tüneli + Caddy basic-auth + IP whitelist gerekir.

  # Structured log toplayıcı (Serilog → Seq). UI 80, ingestion 5341. EULA: tek-kullanıcı dev için kabul.
  seq:
    image: datalust/seq:2024.3
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seq-data:/data
    expose:
      - "5341"
    ports:
      - "127.0.0.1:8081:80"   # http://localhost:8081 (admin)

  # Metrik toplayıcı. api:8080/metrics'i scrape eder; rules.yml alarm kurallarını yükler.
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./compose/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./compose/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus-data:/prometheus
    expose:
      - "9090"
    ports:
      - "127.0.0.1:9090:9090"  # http://localhost:9090 (admin)
    depends_on:
      api:
        condition: service_started

  # Dashboard. Provisioning: datasource (prometheus), dashboard provider, hazır JSON dashboard.
  grafana:
    image: grafana/grafana-oss:11.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      # ⚠ Dev varsayılanı; prod'da env ile değiştir + 127.0.0.1 bağ + SSH tüneli (11 §5).
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./compose/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./compose/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"  # http://localhost:3001 (admin)
    depends_on:
      prometheus:
        condition: service_started

  # Reverse proxy + TLS + güvenlik başlıkları (T2.9). 443: TLS (internal CA, localhost); 80: redirect.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./compose/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # Sertifikalar (internal CA root + leaf'ler) burada kalıcı
      - caddy-config:/config
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--no-check-certificate", "https://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  seq-data:
  prometheus-data:
  grafana-data:
